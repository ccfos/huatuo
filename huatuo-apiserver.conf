# Log level for huatuo-apiserver.
# Supported: Debug, Info, Warn, Error, Panic.
# Default: Info
#
# LogLevel = "Info"

# Runtime resource limit for the huatuo-apiserver process itself.
#
# - LimitCPU
# CPU resource limit in cores.
# Default: 20
#
# - LimitMem
# Memory resource limit in MB.
# Default: 4096
#
[RuntimeCgroup]
    # LimitCPU = 20
    # LimitMem = 4096

# APIServer listening configuration.
#
# - TCPAddr
# The TCP listen address of the huatuo-apiserver, in "host:port" form.
# Leaving host empty means listening on all interfaces.
# Default: ":12740"
#
[APIServer]
    # TCPAddr = ":12740"
    # ReadHeaderTimeoutSeconds = 10
    # ReadTimeoutSeconds       = 30
    # WriteTimeoutSeconds      = 60
    # IdleTimeoutSeconds       = 120
    # ShutdownTimeoutSeconds   = 60
    # MaxHeaderBytes           = 1048576
    # MaxBodyBytes             = 4194304
    # RateLimit                = 200
    # RateBurst                = 200

# Task scheduling limits.
#
# - MaxProfilingTasksPerHost
# Maximum number of profiling tasks allowed per host.
# Default: 3
#
# - MaxTracingTasksPerHost
# Maximum number of tracing tasks allowed per host.
# Default: 5
#
# - MaxTotalProfilingTasks
# Maximum number of profiling tasks allowed across the whole cluster.
# Default: 500
#
# - MaxTotalTracingTasks
# Maximum number of tracing tasks allowed across the whole cluster.
# Default: 1000
#
# - JobStoreDSN
# SQLite data source used to persist jobs across API server restarts.
# Relative paths are resolved from the directory containing this file.
# Default: "jobs.db"
#
# - ShutdownConcurrency
# Maximum concurrent Agent stop requests during shutdown.
# Default: 16
#
[TaskConfig]
    # MaxProfilingTasksPerHost = 3
    # MaxTracingTasksPerHost   = 5
    # MaxTotalProfilingTasks   = 500
    # MaxTotalTracingTasks     = 1000
    # JobStoreDSN              = "jobs.db"
    # ShutdownConcurrency      = 16

# HUATUO Agent HTTP client and job status polling configuration.
#
# - Port
# Agent HTTP port on every target host. Default: 19704
#
# - RequestTimeoutSeconds
# Timeout for one Agent HTTP request. Default: 10
#
# - StatusRetryAttempts / StatusRetryBackoffMillis
# Attempts and delay used when querying Agent task status. Defaults: 3 / 100
#
# - StatusPollIntervalSeconds
# Interval between task status checks. Default: 5
#
# - MaxConsecutivePollErrors
# Consecutive status failures before a job is marked failed. Default: 3
#
[Agent]
    # Port                      = 19704
    # RequestTimeoutSeconds     = 10
    # StatusRetryAttempts       = 3
    # StatusRetryBackoffMillis  = 100
    # StatusPollIntervalSeconds = 5
    # MaxConsecutivePollErrors  = 3

# Elasticsearch / OpenSearch backend used by the apiserver to query
# tracing and event data produced by huatuo-bamai.
#
# - Address
# Full URL of the ES/OS endpoint, e.g.
#   http://127.0.0.1:9200
#   https://127.0.0.1:9200
# Default: "http://127.0.0.1:9200"
#
# - Username / Password
# Credentials used to authenticate against ES/OS. No default.
#
# - Index
# Logical index name that holds huatuo-bamai documents.
# Typically matches the Index configured in huatuo-bamai.conf
# (default there is "huatuo_bamai").
# Default: "huatuo_bamai"
#
[ElasticSearch]
    # Address = "http://127.0.0.1:9200"
    Username = "elastic"
    Password = "huatuo-bamai"
    # Index = "huatuo_bamai"

# Authentication configuration.
# /healthz, /readyz, /metrics, and /version are public. Flame graph query
# endpoints and /debug/pprof/** are restricted to administrators.
#
# Each user is declared with a [[Auth.users]] block.
#
# Supported fields:
# - ID
#   Bearer token presented by the client on each request.
#   Treat this as a secret; generate a sufficiently random value
#   (e.g. `openssl rand -hex 16`).
# - Name
#   Human-readable display name. Not used for authorization.
# - IsAdmin
#   When true, the user has full access and Permissions is ignored.
#   Default: false
# - Permissions
#   List of optional-method URL patterns this user is allowed to access.
#   Only consulted when IsAdmin is false.
#   "**" matches any suffix, e.g. "/v1/traces/**".
#   Prefix a pattern with an HTTP method for least privilege, e.g.
#   "GET /v1/traces/**". A path-only pattern permits every method.
#
# Examples:
#
# # Administrator: full access, Permissions ignored.
# [[Auth.users]]
#     ID      = "REPLACE_WITH_RANDOM_HEX"
#     Name    = "Administrator"
#     IsAdmin = true
#
# # Restricted user: read-only access to traces and profiles.
# [[Auth.users]]
#     ID          = "REPLACE_WITH_RANDOM_HEX"
#     Name        = "huatuo-front"
#     IsAdmin     = false
#     Permissions = ["GET /v1/traces", "GET /v1/traces/**", "GET /v1/profiles", "GET /v1/profiles/**"]

# Profiling configuration.
#
# - AggregationInterval
# Interval (seconds) for aggregating and reporting profiling data.
# Must be greater than 0 and less than 1200.
# Default: 10
#
# - ExecutionTimeout
# Timeout (seconds) for a profiler subprocess.
# Must be at least twice AggregationInterval.
# Default: 20
#
# - MaxProfilerProcs
# Maximum concurrent invocations of third-party profiling tools.
# Must not be negative. Set to 0 to disable the limit.
# Default: 10
#
# - FlameGraphBaseURL
# Base URL of the flame graph dashboard. The apiserver builds per-trace
# links by appending dashboard identifiers to this URL.
# Must use HTTP or HTTPS and include a host.
# Default: "http://localhost:8006/d"
#
[Profiling]
    # AggregationInterval  = 10
    # ExecutionTimeout     = 20
    # MaxProfilerProcs     = 10
    # FlameGraphBaseURL     = "http://localhost:8006/d"
