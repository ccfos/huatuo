services:
  elasticsearch:
    profiles: ["full"]
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION:-8.15.5}
    container_name: elasticsearch
    network_mode: host
    environment:
      discovery.type: single-node
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-}
      KIBANA_SYSTEM_PASSWORD: ${KIBANA_SYSTEM_PASSWORD:-}
    volumes:
      - ./elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - ./elasticsearch-jvm.options:/usr/share/elasticsearch/config/jvm.options:ro
  
  prometheus:
    profiles: ["full"]
    image: prom/prometheus:${PROMETHEUS_VERSION:-v2.53.3}
    container_name: prometheus
    network_mode: host
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

  pyroscope:
    profiles: ["full", "profiling"]
    image: grafana/pyroscope:${PYROSCOPE_VERSION:-2.0.2}
    container_name: pyroscope
    network_mode: host
    command: ["-architecture.storage=v1", "-write-path=ingester"]

  grafana:
    profiles: ["full", "profiling"]
    image: grafana/grafana-oss:${GRAFANA_VERSION:-12.0.3}
    container_name: grafana
    network_mode: host
    environment:
      GF_INSTALL_PLUGINS: "yesoreyeram-infinity-datasource ${INFINITY_DATA_SOURCE:-3.4.1}"
    volumes:
      - ./grafana/datasources/elasticsearch.yaml:/etc/grafana/provisioning/datasources/elasticsearch.yaml:ro
      - ./grafana/datasources/prometheus.yaml:/etc/grafana/provisioning/datasources/prometheus.yaml:ro
      - ./grafana/datasources/infinity.yaml:/etc/grafana/provisioning/datasources/infinity.yaml:ro
      - ./grafana/datasources/pyroscope.yaml:/etc/grafana/provisioning/datasources/pyroscope.yaml:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro

  huatuo-apiserver:
    profiles: ["full"]
    image: huatuo/huatuo-bamai:latest
    container_name: huatuo-apiserver
    network_mode: host
    environment:
      ELASTICSEARCH_HOST: ${ELASTICSEARCH_HOST:-}
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-}
      RUN_PATH: ${RUN_PATH:-}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - ../../huatuo-apiserver.conf:${RUN_PATH}/conf/huatuo-apiserver.conf:rw
      - ./run-huatuo-apiserver.sh:${RUN_PATH}/run-huatuo-apiserver.sh:rw
    working_dir: ${RUN_PATH}
    command: ["./run-huatuo-apiserver.sh"]
    depends_on:
      - elasticsearch
      - prometheus

  huatuo-bamai:
    profiles: ["full", "profiling"]
    image: ${HUATUO_BAMAI_IMAGE:-huatuo/huatuo-bamai:latest}
    container_name: huatuo-bamai
    network_mode: host
    cgroup: host
    privileged: true
    working_dir: ${RUN_PATH:-/home/huatuo-bamai}
    environment:
      ELASTICSEARCH_HOST: ${ELASTICSEARCH_HOST:-}
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-}
      HUATUO_MODE: ${COMPOSE_PROFILES:-full}
      RUN_PATH: ${RUN_PATH:-/home/huatuo-bamai}
    volumes:
      - /sys:/sys:rw
      - /proc:/proc:rw
      - /run:/run:rw
      - /etc:/etc:ro
      - /var:/var:ro
      - ../../huatuo-bamai.conf:${RUN_PATH:-/home/huatuo-bamai}/conf/huatuo-bamai.conf:ro
      - ./run-huatuo-bamai.sh:${RUN_PATH:-/home/huatuo-bamai}/run-huatuo-bamai.sh:ro
    command: ["./run-huatuo-bamai.sh"]